<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>what-pic</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        background: #f5f5f7;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
          sans-serif;
        color: #1d1d1f;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Header ── */
      header {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        position: sticky;
        top: 0;
        z-index: 100;
        padding: 0 2rem;
        height: 52px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      header img {
        height: 28px;
        width: 28px;
      }
      header span {
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: -0.3px;
      }

      /* ── Layout ── */
      main {
        max-width: 680px;
        margin: 0 auto;
        padding: 3rem 1.5rem 5rem;
      }

      .hero {
        text-align: center;
        margin-bottom: 2.5rem;
      }
      .hero img {
        width: 88px;
        height: 88px;
        margin-bottom: 1.25rem;
      }
      .hero h1 {
        font-size: 2.4rem;
        font-weight: 700;
        letter-spacing: -1px;
        line-height: 1.1;
      }
      .hero p {
        margin-top: 0.6rem;
        font-size: 1.05rem;
        color: #86868b;
      }

      /* ── Card ── */
      .card {
        background: #fff;
        border-radius: 18px;
        box-shadow:
          0 2px 24px rgba(0, 0, 0, 0.07),
          0 1px 4px rgba(0, 0, 0, 0.04);
        padding: 2rem;
      }

      /* ── Drop zone ── */
      .drop-zone {
        border: 2px dashed #d2d2d7;
        border-radius: 12px;
        padding: 2.5rem 1rem;
        text-align: center;
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
        background: #f5f5f7;
        position: relative;
      }
      .drop-zone.drag-over {
        border-color: #0071e3;
        background: #f0f6ff;
      }
      .drop-zone input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }
      .drop-zone svg {
        margin-bottom: 0.6rem;
        opacity: 0.35;
      }
      .drop-zone p {
        font-size: 0.92rem;
        color: #86868b;
        pointer-events: none;
      }
      .drop-zone strong {
        color: #0071e3;
        font-weight: 500;
      }

      .file-list {
        margin-top: 0.65rem;
        font-size: 0.8rem;
        color: #86868b;
        min-height: 1rem;
        text-align: center;
      }

      /* ── Form ── */
      .field {
        margin-top: 1.25rem;
      }

      label {
        display: block;
        font-size: 0.78rem;
        font-weight: 600;
        color: #86868b;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.45rem;
      }

      textarea,
      select {
        width: 100%;
        background: #f5f5f7;
        border: 1px solid #d2d2d7;
        border-radius: 10px;
        color: #1d1d1f;
        font-size: 0.95rem;
        padding: 0.75rem 1rem;
        outline: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        font-family: inherit;
        appearance: none;
        -webkit-appearance: none;
      }
      textarea:focus,
      select:focus {
        border-color: #0071e3;
        box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
      }
      textarea {
        resize: vertical;
        min-height: 90px;
      }

      .select-wrap {
        position: relative;
      }
      .select-wrap::after {
        content: "";
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        border-left: 4px solid transparent;
        border-right: 4px solid transparent;
        border-top: 5px solid #86868b;
        pointer-events: none;
      }

      .bottom-row {
        display: flex;
        gap: 0.75rem;
        align-items: flex-end;
        margin-top: 1.25rem;
      }
      .bottom-row .field {
        flex: 1;
        margin-top: 0;
      }

      /* ── Buttons ── */
      button.primary {
        background: #0071e3;
        color: #fff;
        border: none;
        border-radius: 980px;
        padding: 0.72rem 1.6rem;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        transition:
          background 0.15s,
          transform 0.1s;
        font-family: inherit;
        letter-spacing: -0.1px;
      }
      button.primary:hover:not(:disabled) {
        background: #0077ed;
      }
      button.primary:active:not(:disabled) {
        transform: scale(0.98);
      }
      button.primary:disabled {
        background: #a1c4f0;
        cursor: not-allowed;
      }

      button.secondary {
        background: transparent;
        color: #0071e3;
        border: 1px solid #d2d2d7;
        border-radius: 980px;
        padding: 0.6rem 1.25rem;
        font-size: 0.88rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
        font-family: inherit;
      }
      button.secondary:hover {
        background: #f5f5f7;
      }

      button.ghost {
        background: none;
        border: none;
        color: #86868b;
        font-size: 0.82rem;
        cursor: pointer;
        padding: 0.2rem 0.5rem;
        border-radius: 6px;
        font-family: inherit;
        transition:
          color 0.15s,
          background 0.15s;
      }
      button.ghost:hover {
        color: #1d1d1f;
        background: #f5f5f7;
      }

      /* ── Loading state ── */
      .loading-state {
        display: none;
        margin-top: 1.5rem;
      }

      .progress-track {
        height: 3px;
        background: #e5e5ea;
        border-radius: 3px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        border-radius: 3px;
        background: linear-gradient(
          90deg,
          #0071e3 0%,
          #34aadc 50%,
          #0071e3 100%
        );
        background-size: 200% 100%;
        transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        animation: shimmer 1.8s linear infinite;
      }

      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      .loading-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 0.9rem;
      }

      .loading-left {
        display: flex;
        align-items: center;
        gap: 0.55rem;
      }

      .loading-dot {
        width: 7px;
        height: 7px;
        background: #0071e3;
        border-radius: 50%;
        flex-shrink: 0;
        animation: dot-pulse 1.4s ease-in-out infinite;
      }

      @keyframes dot-pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.3;
          transform: scale(0.75);
        }
      }

      #loadingText {
        font-size: 0.88rem;
        color: #86868b;
      }

      /* ── Error ── */
      .error-box {
        display: none;
        margin-top: 1rem;
        padding: 0.85rem 1rem;
        border-radius: 12px;
        align-items: flex-start;
        gap: 0.75rem;
      }
      .error-box.visible {
        display: flex;
      }

      .error-box.err-server {
        background: #fff2f2;
        border: 1px solid #ffd0d0;
      }
      .error-box.err-ratelimit {
        background: #fffbeb;
        border: 1px solid #fde68a;
      }
      .error-box.err-network {
        background: #f5f5f7;
        border: 1px solid #d2d2d7;
      }
      .error-box.err-client {
        background: #f5f5f7;
        border: 1px solid #d2d2d7;
      }

      .error-icon {
        font-size: 1.05rem;
        line-height: 1.4;
        flex-shrink: 0;
      }

      .error-body {
        flex: 1;
        min-width: 0;
      }

      .error-title {
        font-size: 0.88rem;
        font-weight: 600;
        margin-bottom: 0.15rem;
      }
      .err-server .error-title {
        color: #c00;
      }
      .err-ratelimit .error-title {
        color: #92400e;
      }
      .err-network .error-title,
      .err-client .error-title {
        color: #1d1d1f;
      }

      .error-detail {
        font-size: 0.82rem;
        color: #86868b;
        line-height: 1.5;
        word-break: break-word;
      }

      /* ── Result ── */
      .result-section {
        display: none;
        margin-top: 1.5rem;
        border-top: 1px solid #f2f2f2;
        padding-top: 1.5rem;
      }
      .result-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.75rem;
      }
      .result-header label {
        margin-bottom: 0;
      }

      pre {
        background: #f5f5f7;
        border: 1px solid #e5e5ea;
        border-radius: 10px;
        padding: 1rem 1.1rem;
        overflow: auto;
        max-height: 380px;
        font-size: 0.82rem;
        line-height: 1.65;
        white-space: pre-wrap;
        word-break: break-word;
        color: #1d1d1f;
        font-family: "SF Mono", "Menlo", "Consolas", monospace;
      }

      footer {
        text-align: center;
        margin-top: 2.5rem;
        font-size: 0.78rem;
        color: #c7c7cc;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="hero">
        <img src="/logo.svg" alt="what-pic" />
        <h1>What's in this picture?</h1>
        <p>
          Upload images and get structured AI analysis — locally or via cloud.
        </p>
      </div>

      <div class="card">
        <div class="drop-zone" id="dropZone">
          <svg
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#1d1d1f"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="3" width="18" height="18" rx="3" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <path d="M21 15l-5-5L5 21" />
          </svg>
          <p><strong>Click to select</strong> or drag images here</p>
          <p style="margin-top: 0.25rem; font-size: 0.8rem">
            JPEG, PNG, WEBP, GIF, HEIC, TIFF, BMP — multiple files supported
          </p>
          <input type="file" id="fileInput" multiple accept="image/*" />
        </div>
        <div class="file-list" id="fileList"></div>

        <div class="field">
          <label for="prompt">Prompt</label>
          <textarea
            id="prompt"
            placeholder="e.g. List every visible text element. Respond in JSON with keys: text, position, font_style."
          ></textarea>
        </div>

        <div class="bottom-row">
          <div class="field">
            <label for="format">Output format</label>
            <div class="select-wrap">
              <select id="format">
                <option value="text">Plain text</option>
                <option value="json">JSON</option>
                <option value="yaml">YAML</option>
                <option value="csv">CSV</option>
              </select>
            </div>
          </div>
          <button class="primary" id="submitBtn" onclick="run()">
            Analyze
          </button>
        </div>

        <!-- Loading -->
        <div class="loading-state" id="loadingState">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="loading-row">
            <div class="loading-left">
              <div class="loading-dot"></div>
              <span id="loadingText">Uploading…</span>
            </div>
            <button class="ghost" id="cancelBtn" onclick="cancelRequest()">
              Cancel
            </button>
          </div>
        </div>

        <!-- Error -->
        <div class="error-box" id="errorBox">
          <div class="error-icon" id="errorIcon"></div>
          <div class="error-body">
            <div class="error-title" id="errorTitle"></div>
            <div class="error-detail" id="errorDetail"></div>
          </div>
        </div>

        <!-- Result -->
        <div class="result-section" id="resultSection">
          <div class="result-header">
            <label>Result</label>
            <button class="secondary" id="dlBtn">Download</button>
          </div>
          <pre id="resultPre"></pre>
        </div>
      </div>

      <footer>Runs on Ollama by default — no images leave your machine.</footer>
    </main>

    <script>
      const dropZone = document.getElementById("dropZone");
      const fileInput = document.getElementById("fileInput");
      let lastBlob = null,
        lastFilename = "results.txt";
      let abortCtrl = null;
      let progressTimers = [];
      let progressRaf = null;
      let targetPct = 0,
        currentPct = 0;

      // ── Drag and drop ──────────────────────────────────────────────
      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("drag-over");
      });
      dropZone.addEventListener("dragleave", () =>
        dropZone.classList.remove("drag-over"),
      );
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("drag-over");
        fileInput.files = e.dataTransfer.files;
        updateFileList();
      });
      fileInput.addEventListener("change", updateFileList);

      function updateFileList() {
        const files = [...fileInput.files];
        const el = document.getElementById("fileList");
        if (!files.length) {
          el.textContent = "";
          return;
        }
        el.textContent =
          files.length === 1
            ? files[0].name
            : `${files.length} files: ${files.map((f) => f.name).join(", ")}`;
      }

      // ── Validation ─────────────────────────────────────────────────
      const MAX_CLIENT_MB = 100;
      const ACCEPTED_TYPES = [
        "image/jpeg",
        "image/png",
        "image/webp",
        "image/gif",
        "image/heic",
        "image/heif",
        "image/tiff",
        "image/bmp",
      ];

      function validateFiles(files) {
        for (const f of files) {
          if (f.size === 0) return `"${f.name}" is empty.`;
          if (f.size > MAX_CLIENT_MB * 1024 * 1024)
            return `"${f.name}" is too large (${(f.size / 1024 / 1024).toFixed(1)} MB). Maximum is ${MAX_CLIENT_MB} MB.`;
          // MIME type check where available
          if (
            f.type &&
            !ACCEPTED_TYPES.includes(f.type) &&
            !f.type.startsWith("image/")
          )
            return `"${f.name}" doesn't look like an image (${f.type}).`;
        }
        return null;
      }

      // ── Progress bar ───────────────────────────────────────────────
      function setProgress(pct) {
        targetPct = pct;
        animateProgress();
      }

      function animateProgress() {
        if (progressRaf) cancelAnimationFrame(progressRaf);
        const step = () => {
          const diff = targetPct - currentPct;
          if (Math.abs(diff) < 0.2) {
            currentPct = targetPct;
          } else {
            currentPct += diff * 0.12;
          }
          document.getElementById("progressFill").style.width =
            currentPct + "%";
          if (currentPct !== targetPct)
            progressRaf = requestAnimationFrame(step);
        };
        progressRaf = requestAnimationFrame(step);
      }

      function startProgressPhases(fileCount) {
        currentPct = 0;
        targetPct = 0;
        setProgress(8);

        const noun = fileCount === 1 ? "1 image" : `${fileCount} images`;
        const phases = [
          { delay: 600, pct: 20, text: "Extracting metadata…" },
          { delay: 1400, pct: 35, text: `Analyzing ${noun} with AI…` },
          { delay: 30000, pct: 65, text: "Still working…" },
          {
            delay: 90000,
            pct: 78,
            text: "This is taking a while — large model?",
          },
        ];

        phases.forEach(({ delay, pct, text }) => {
          progressTimers.push(
            setTimeout(() => {
              setProgress(pct);
              document.getElementById("loadingText").textContent = text;
            }, delay),
          );
        });
      }

      function clearProgressTimers() {
        progressTimers.forEach(clearTimeout);
        progressTimers = [];
        if (progressRaf) {
          cancelAnimationFrame(progressRaf);
          progressRaf = null;
        }
      }

      // ── Main flow ──────────────────────────────────────────────────
      async function run() {
        const files = [...fileInput.files];
        if (!files.length) {
          showError(
            "client",
            "No images selected",
            "Choose at least one image to analyze.",
          );
          return;
        }

        const validationErr = validateFiles(files);
        if (validationErr) {
          showError("client", "Invalid file", validationErr);
          return;
        }

        const prompt = document.getElementById("prompt").value.trim();
        const format = document.getElementById("format").value;

        const fd = new FormData();
        files.forEach((f) => fd.append("files[]", f));
        fd.append("prompt", prompt || "Describe this image.");
        fd.append("format", format);

        abortCtrl = new AbortController();
        setLoading(true, files.length);
        hideError();
        document.getElementById("resultSection").style.display = "none";

        try {
          const resp = await fetch("/analyze", {
            method: "POST",
            body: fd,
            signal: abortCtrl.signal,
          });

          setProgress(90);
          document.getElementById("loadingText").textContent =
            "Formatting results…";

          const text = await resp.text();

          if (!resp.ok) {
            const msg = text.trim() || `Server returned ${resp.status}`;
            if (resp.status === 429) {
              showError("ratelimit", "Rate limit reached", msg);
            } else if (resp.status === 413) {
              showError("client", "Upload too large", msg);
            } else if (resp.status >= 500) {
              showError("server", "Server error", msg);
            } else {
              showError("client", "Request error", msg);
            }
            return;
          }

          setProgress(100);

          lastBlob = new Blob([text], {
            type: resp.headers.get("Content-Type") || "text/plain",
          });
          lastFilename = `results.${format === "text" ? "txt" : format}`;
          document.getElementById("resultPre").textContent = text;
          document.getElementById("resultSection").style.display = "block";
        } catch (e) {
          if (e.name === "AbortError") return; // user cancelled — no error shown
          if (!navigator.onLine) {
            showError(
              "network",
              "No internet connection",
              "Check your network and try again.",
            );
          } else {
            showError(
              "network",
              "Connection failed",
              "Could not reach the server. Is it running?",
            );
          }
        } finally {
          setLoading(false);
        }
      }

      function cancelRequest() {
        if (abortCtrl) abortCtrl.abort();
        setLoading(false);
      }

      // ── UI helpers ─────────────────────────────────────────────────
      function setLoading(on, fileCount = 1) {
        const state = document.getElementById("loadingState");
        const btn = document.getElementById("submitBtn");
        if (on) {
          clearProgressTimers();
          state.style.display = "block";
          btn.disabled = true;
          document.getElementById("loadingText").textContent = "Uploading…";
          startProgressPhases(fileCount);
        } else {
          clearProgressTimers();
          // brief pause so the 100% fill is visible before hiding
          setTimeout(() => {
            state.style.display = "none";
            currentPct = 0;
          }, 500);
          btn.disabled = false;
        }
      }

      const ERROR_META = {
        server: { icon: "⚠️", cls: "err-server" },
        ratelimit: { icon: "⏳", cls: "err-ratelimit" },
        network: { icon: "📡", cls: "err-network" },
        client: { icon: "ℹ️", cls: "err-client" },
      };

      function showError(type, title, detail) {
        const box = document.getElementById("errorBox");
        const meta = ERROR_META[type] || ERROR_META.server;
        // reset classes
        box.className = "error-box visible " + meta.cls;
        document.getElementById("errorIcon").textContent = meta.icon;
        document.getElementById("errorTitle").textContent = title;
        document.getElementById("errorDetail").textContent = detail;
      }

      function hideError() {
        const box = document.getElementById("errorBox");
        box.className = "error-box";
      }

      document.getElementById("dlBtn").addEventListener("click", () => {
        if (!lastBlob) return;
        const a = document.createElement("a");
        a.href = URL.createObjectURL(lastBlob);
        a.download = lastFilename;
        a.click();
        URL.revokeObjectURL(a.href);
      });
    </script>
  </body>
</html>
